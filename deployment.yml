apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotstardeploy
  labels:
    app: hotstar
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hotstar
  template:
    metadata:
      labels:
        app: hotstar
    spec:
      containers:
      - name: hotstarcont
        image:jsaikumar9999/sai_hotstar
        ports:
        - containerPort: 4000
